<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart AI Real Estate Bot</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  width:400px;
  background:#1e293b;
  border-radius:12px;
  padding:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h2 {
  text-align:center;
}

.chat-box {
  height:300px;
  overflow-y:auto;
  background:#0f172a;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

.msg {
  margin:8px 0;
}

.user {
  text-align:right;
}

.bot {
  text-align:left;
  color:#22c55e;
}

input {
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:5px;
}

button {
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <h2>🤖 Smart Real Estate Bot</h2>

  <div id="chat" class="chat-box"></div
