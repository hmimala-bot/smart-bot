<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مستشارك العقاري الذكي</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.header {
  text-align: center;
  padding: 20px;
  background: #111827;
  border-bottom: 1px solid #333;
}

.header h2 {
  margin: 0;
}

.header p {
  color: #9ca3af;
  font-size: 14px;
}

#chat {
  height: 65vh;
  overflow-y: auto;
  padding: 15px;
}

.msg {
  margin: 10px 0;
  padding: 12px;
  border-radius: 10px;
  max-width: 75%;
  line-height: 1.5;
}

.user {
  background: #2563eb;
  margin-left: auto;
}

.bot {
  background: #1f2937;
}

#inputBox {
  display: flex;
  padding: 10px;
  background: #111827;
  border-top: 1px solid #333;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
  border-radius: 6px;
}

button {
  padding: 12px 20px;
  margin-left: 10px;
  border: none;
  background: #2563eb;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.typing {
  font-size: 13px;
  color: #9ca3af;
}
</style>
</head>

<body>

<div class="header">
  <h2>🏡 مستشارك العقاري الذكي</h2>
  <p>اختر أفضل عقار خلال ثواني</p>
</div>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="مثال: شقة في عجمان 4000" />
  <button onclick="send()">إرسال</button>
</div>

<script>
function addMessage(text, type) {
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 9999;
}

function send() {
  let input = document.getElementById("msg");
  let message = input.value.trim();

  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  let typing = document.createElement("div");
  typing.className = "typing";
  typing.innerText = "يكتب...";
  document.getElementById("chat").appendChild(typing);

  fetch("https://gha85.app.n8n.cloud/webhook/real-estate-chat?message=" + encodeURIComponent(message))
    .then(res => res.text())
    .then(data => {
      typing.remove();
      addMessage(data, "bot");
    })
    .catch(() => {
      typing.remove();
      addMessage("صار خطأ، حاول مرة ثانية", "bot");
    });
}
</script>

</body>
</html>
