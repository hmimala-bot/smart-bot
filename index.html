<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المستشار العقاري الذكي</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(180deg, #020617, #0f172a);
  color: white;
  margin: 0;
}

/* الهيدر */
.header {
  text-align: center;
  padding: 20px;
  background: #020617;
  border-bottom: 1px solid #333;
}

.header h2 {
  margin: 0;
  color: #d4af37;
}

.header p {
  color: #9ca3af;
  font-size: 14px;
}

/* الشات */
#chat {
  height: 65vh;
  overflow-y: auto;
  padding: 15px;
}

/* الرسائل */
.msg {
  margin: 10px 0;
  padding: 12px;
  border-radius: 10px;
  max-width: 75%;
  line-height: 1.6;
}

/* المستخدم */
.user {
  background: linear-gradient(135deg, #d4af37, #b8962e);
  color: black;
  margin-left: auto;
}

/* البوت */
.bot {
  background: #1f2937;
  border: 1px solid #d4af37;
}

/* الكتابة */
.typing {
  font-size: 13px;
  color: #d4af37;
}

/* الإدخال */
#inputBox {
  display: flex;
  padding: 10px;
  background: #020617;
  border-top: 1px solid #333;
}

input {
  flex: 1;
  padding: 12px;
  border: 1px solid #333;
  outline: none;
  border-radius: 6px;
  background: #111827;
  color: white;
}

/* الزر */
button {
  padding: 12px 20px;
  margin-left: 10px;
  border: none;
  background: linear-gradient(135deg, #d4af37, #b8962e);
  color: black;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="header">
  <h2>🏡 المستشار العقاري الذكي</h2>
  <p>اختار أفضل عقار خلال ثواني</p>
</div>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="مثال: شقة في عجمان 4000" />
  <button onclick="send()">إرسال</button>
</div>

<script>

let sending = false;

function addMessage(text, type) {
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  let chat = document.getElementById("chat");
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function send() {
  if (sending) return;

  let input = document.getElementById("msg");
  let message = input.value.trim();

  if (!message) return;

  sending = true;

  addMessage(message, "user");
  input.value = "";

  let typing = document.createElement("div");
  typing.className = "typing";
  typing.innerText = "يكتب...";
  document.getElementById("chat").appendChild(typing);

  fetch("https://gha85.app.n8n.cloud/webhook/real-estate-chat?message=" + encodeURIComponent(message))
    .then(res => res.text())
    .then(data => {
      typing.remove();
      addMessage(data, "bot");
      sending = false;
    })
    .catch(() => {
      typing.remove();
      addMessage("صار خطأ، حاول مرة ثانية", "bot");
      sending = false;
    });
}

/* Enter يرسل */
document.getElementById("msg").addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});

/* رسالة أولية */
window.onload = () => {
  addMessage("هلا 👋 وش تدور عليه؟ شقة أو فيلا؟ وكم ميزانيتك؟", "bot");
};

</script>

</body>
</html>
