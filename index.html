<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المستشار العقاري</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0b141a;
}

/* الهيدر */
.header {
  background: #075e54;
  color: white;
  padding: 12px;
  text-align: center;
  font-weight: bold;
}

/* الشات */
#chat {
  height: 70vh;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  background-image: url("https://i.imgur.com/1bX5QH6.png");
}

/* الرسائل */
.msg {
  padding: 10px 14px;
  border-radius: 10px;
  margin: 6px 0;
  max-width: 75%;
  line-height: 1.5;
  font-size: 14px;
}

/* المستخدم (يمين) */
.user {
  background: #25d366;
  color: black;
  align-self: flex-end;
  border-bottom-right-radius: 2px;
}

/* البوت (يسار) */
.bot {
  background: #202c33;
  color: white;
  align-self: flex-start;
  border-bottom-left-radius: 2px;
}

/* الكتابة */
.typing {
  font-size: 12px;
  color: #ccc;
  margin: 5px;
}

/* الإدخال */
#inputBox {
  display: flex;
  padding: 10px;
  background: #202c33;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
  border-radius: 20px;
  background: #2a3942;
  color: white;
}

/* زر الإرسال */
button {
  margin-left: 10px;
  border: none;
  background: #25d366;
  color: black;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  cursor: pointer;
  font-size: 18px;
}

button:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="header">
  🏡 المستشار العقاري
</div>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="اكتب رسالتك..." />
  <button onclick="send()">➤</button>
</div>

<script>

let sending = false;

function addMessage(text, type) {
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  let chat = document.getElementById("chat");
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function send() {
  if (sending) return;

  let input = document.getElementById("msg");
  let message = input.value.trim();

  if (!message) return;

  sending = true;

  addMessage(message, "user");
  input.value = "";

  let typing = document.createElement("div");
  typing.className = "typing";
  typing.innerText = "يكتب...";
  document.getElementById("chat").appendChild(typing);

  fetch("https://gha85.app.n8n.cloud/webhook/real-estate-chat?message=" + encodeURIComponent(message))
    .then(res => res.text())
    .then(data => {
      typing.remove();
      addMessage(data, "bot");
      sending = false;
    })
    .catch(() => {
      typing.remove();
      addMessage("صار خطأ، حاول مرة ثانية", "bot");
      sending = false;
    });
}

/* Enter */
document.getElementById("msg").addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});

/* رسالة أولية */
window.onload = () => {
  addMessage("هلا 👋 وش تدور عليه؟ شقة أو فيلا؟ وكم ميزانيتك؟", "bot");
};

</script>

</body>
</html>
